<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presente - Francisco</title>

<!-- Fonte Luckiest Guy -->
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    height:100vh;
    font-family:'Luckiest Guy', cursive;
    cursor:pointer;
    overflow:hidden;
}

/* estrutura das telas */
.tela{
    position:relative;
    width:100%;
    height:100vh;
    color:#fff;
}

/* imagem CENTRAL */
.imagem-centro{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    width:230px;
}

/* TEXTO EMBAIXO (igual tela 1) */
.texto-baixo{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:28px;
    letter-spacing:2px;
}

/* TEXTO PARÁGRAFO */
.texto-paragrafo{
    position:absolute;
    top:65%;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    max-width:600px;
    text-align:center;
    font-size:18px;
    line-height:1.6;
    letter-spacing:1px;
}

/* título tela 3 */
.titulo{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:38px;
}

/* link presente */
.link-presente{
    position:absolute;
    top:55%;
    width:100%;
    text-align:center;
    font-size:24px;
}

.link-presente a{
    color:#00c3ff;
    text-decoration:none;
}

.link-presente a:hover{
    text-decoration:underline;
}

/* telas escondidas */
#tela2,
#tela3{
    display:none;
}
</style>
</head>

<body onclick="proximaTela()">

<!-- TELA 1 -->
<div id="tela1" class="tela">
    <img src="https://raw.githubusercontent.com/ViquinhoDev/ViquinhoDev.github.io/refs/heads/main/present.png" class="imagem-centro">
    <div class="texto-baixo">
        Clique para abrir o presente!
    </div>
</div>

<!-- TELA 2 -->
<div id="tela2" class="tela">
    <img src="https://stardewvalleywiki.com/mediawiki/images/b/b2/Animals_Icon.png" class="imagem-centro">

    <div class="texto-paragrafo">
Feliz aniversario, Francisquinho fran! que voce viva os seus 11 (né?) anos feliz alegre e muito jogador de stardew valley!!!.
    </div>

    <div class="texto-baixo">
        Clique para prosseguir!
    </div>
</div>

<!-- TELA 3 -->
<div id="tela3" class="tela">
    <div class="titulo">
        PRESENTE:
    </div>

    <div class="link-presente">
    <a href="direct.html">Clique aqui para abrir</a>
    </div>
</div>

<script>
let etapa = 1;

function proximaTela(){

    if(etapa === 1){
        document.getElementById("tela1").style.display="none";
        document.getElementById("tela2").style.display="block";
        etapa = 2;
    }
    else if(etapa === 2){
        document.getElementById("tela2").style.display="none";
        document.getElementById("tela3").style.display="block";
        document.body.onclick = null; // para parar depois da tela 3
        etapa = 3;
    }
}
</script>

</body>
</html>
